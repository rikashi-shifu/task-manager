spring.application.name=task-manager-backend
server.port=${SERVER_PORT:8080}

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskdb}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:p@in$takingNess}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your_super_secret_key_change_this_in_production_12345678901234567890}
jwt.expiration=86400000

# CORS Configuration
frontend.url=${FRONTEND_URL:http://localhost:5173}
frontend.url.local=${FRONTEND_URL_LOCAL:http://localhost:5173}

# Logging
logging.level.root=INFO
logging.level.com.taskmanager=DEBUG
