spring.application.name=task-manager-backend
server.port=${PORT:8080}
server.servlet.context-path=/

# PostgreSQL Database Configuration (using environment variables)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/taskdb}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (use environment variable in production)
jwt.secret=${JWT_SECRET:your_super_secret_key_change_this_in_production_12345678901234567890}
jwt.expiration=86400000

# CORS Configuration (update for your production domain)
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Logging
logging.level.root=WARN
logging.level.com.taskmanager=INFO
