spring.application.name=task-manager-backend
server.port=${PORT:8080}
server.servlet.context-path=/

# PostgreSQL Database Configuration
# Railway exposes individual Postgres reference variables (PGHOST, PGPORT, PGDATABASE,
# PGUSER, PGPASSWORD) alongside DATABASE_URL. We construct the JDBC URL from these
# because Spring Boot / HikariCP requires the jdbc:postgresql:// scheme, not the
# postgresql:// URI that DATABASE_URL provides.
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool tuning for Railway's managed Postgres
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS Configuration
# FRONTEND_URL should be set to https://task-manager-frontend.railway.app
# FRONTEND_URL_LOCAL is intentionally left empty in production to prevent
# localhost origins from being allowed.
frontend.url=${FRONTEND_URL:https://task-manager-frontend.railway.app}
frontend.url.local=${FRONTEND_URL_LOCAL:}

# Logging
logging.level.root=WARN
logging.level.com.taskmanager=INFO
